<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Météo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
  }

  /* BACKGROUND GRADIENT selon saison */
  .bg-winter { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%); }
  .bg-spring { background: linear-gradient(180deg, #2d6a4f 0%, #40916c 40%, #74c69d 100%); }
  .bg-summer { background: linear-gradient(180deg, #f77f00 0%, #d62828 20%, #457b9d 60%, #1d3557 100%); }
  .bg-autumn { background: linear-gradient(180deg, #6d4c41 0%, #bf8040 40%, #e9c46a 100%); }

  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    padding: 60px 24px 20px;
    text-align: center;
    position: relative;
  }

  .city-name {
    font-size: 34px;
    font-weight: 300;
    letter-spacing: -0.5px;
    opacity: 0.9;
  }

  .year-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
  }

  .year-tab {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 15px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
    font-family: inherit;
  }

  .year-tab.active {
    background: rgba(255,255,255,0.35);
    font-weight: 600;
  }

  /* MONTH SCROLL */
  .month-scroll {
    display: flex;
    gap: 8px;
    padding: 12px 24px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .month-scroll::-webkit-scrollbar { display: none; }

  .month-btn {
    background: rgba(255,255,255,0.12);
    border: none;
    color: rgba(255,255,255,0.7);
    padding: 6px 14px;
    border-radius: 14px;
    font-size: 13px;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    backdrop-filter: blur(10px);
  }

  .month-btn.active {
    background: rgba(255,255,255,0.3);
    color: #fff;
    font-weight: 600;
  }

  /* MONTH SECTION */
  .month-section { display: none; }
  .month-section.visible { display: block; }

  .month-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.6;
    padding: 8px 24px 4px;
  }

  /* CARDS CONTAINER */
  .days-container {
    padding: 0 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* DAY CARD */
  .day-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 14px 16px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .day-name {
    font-size: 15px;
    font-weight: 500;
    opacity: 0.9;
  }

  .day-number {
    font-size: 13px;
    opacity: 0.5;
  }

  /* TEMPS ROW */
  .temps-row {
    display: flex;
    gap: 8px;
  }

  .temp-block {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .temp-block .icon { font-size: 16px; }

  .temp-info { flex: 1; }

  .temp-time {
    font-size: 10px;
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .temp-value {
    font-size: 20px;
    font-weight: 300;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .temp-value span {
    font-size: 12px;
    opacity: 0.7;
  }

  .temp-desc {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 2px;
    line-height: 1.2;
  }

  /* COLOR CODING */
  .cold { color: #7ec8e3; }
  .cool { color: #a8d8ea; }
  .mild { color: #b8e0a4; }
  .warm { color: #ffd166; }
  .hot  { color: #ef8c5a; }
  .very-hot { color: #e63946; }

  /* NOTE CARD */
  .note-card {
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 12px;
    opacity: 0.7;
    font-style: italic;
    margin-top: 2px;
  }

  /* FOOTER NAV */
  .footer-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    justify-content: space-around;
    padding: 12px 0 24px;
  }

  .nav-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.2s;
  }

  .nav-btn .nav-icon { font-size: 22px; }
  .nav-btn.active { color: #fff; }

  /* STATS VIEW */
  .stats-view { display: none; padding: 20px 16px 100px; }
  .stats-view.visible { display: block; }

  .stat-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .stat-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.5;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 36px;
    font-weight: 200;
  }

  .stat-sub {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 2px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .main-view { display: block; }
  .main-view.hidden { display: none; }

</style>
</head>

<div class="app bg-winter" id="app">

  <div class="header">

  <!-- STATS VIEW -->

    <div class="stats-grid">

    </div>
    <div class="stat-card">

      <div class="stat-sub">Toutes mesures confondues</div>
    </div>
    <div class="stat-card">

      <div class="stat-value" id="statDays">--</div>
      <div class="stat-sub" id="statDaysSub">--</div>
    </div>
  </div>

  <div class="footer-nav">
    <button class="nav-btn active" id="navWeather" onclick="showView('weather')">

    </button>
    <button class="nav-btn" id="navStats" onclick="showView('stats')">

  </div>

</div>
