<<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal Météo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: white;
    padding: 20px;
  }

  h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #fff, #a8d8ea);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 0.9rem;
    margin-bottom: 30px;
  }

  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  input, select, textarea {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 12px 14px;
    color: white;
    font-size: 1rem;
    font-family: -apple-system, sans-serif;
    outline: none;
    transition: all 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: rgba(168,216,234,0.6);
    background: rgba(255,255,255,0.15);
  }

  select option { background: #1a1a2e; color: white; }

  textarea { resize: none; height: 80px; }

  .emoji-grid {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .emoji-btn {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    font-size: 1.5rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .emoji-btn.selected {
    border-color: #a8d8ea;
    background: rgba(168,216,234,0.2);
    transform: scale(1.1);
  }

  .btn-submit {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, #a8d8ea, #7ec8e3);
    color: #1a1a2e;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-submit:active { transform: scale(0.97); opacity: 0.9; }

  .entries-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .entries-title {
    font-size: 1.2rem;
    font-weight: 700;
  }

  .count-badge {
    background: rgba(168,216,234,0.2);
    border: 1px solid rgba(168,216,234,0.4);
    color: #a8d8ea;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
  }

  .entry-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
    transition: all 0.2s;
  }

  .entry-card:active { transform: scale(0.99); }

  .entry-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .entry-date {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
  }

  .entry-mood { font-size: 1.5rem; }

  .entry-temps {
    font-size: 1.1rem;
    font-weight: 700;
    color: #a8d8ea;
    margin-bottom: 4px;
  }

  .entry-lieu {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
  }

  .entry-note {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.75);
    line-height: 1.4;
  }

  .entry-meteo {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 2px 10px;
    font-size: 0.8rem;
    margin-top: 8px;
  }

  .delete-btn {
    background: rgba(255,80,80,0.15);
    border: 1px solid rgba(255,80,80,0.3);
    color: rgba(255,120,120,0.9);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .delete-btn:active { background: rgba(255,80,80,0.3); }

  .empty {
    text-align: center;
    color: rgba(255,255,255,0.3);
    padding: 30px;
    font-size: 0.95rem;
  }

  .section-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<h1>🌤 Journal Météo</h1>
<p class="subtitle">Ton journal personnel du temps</p>

<div class="card">
  <div class="form-grid">
    <div>
      <label>📅 Date</label>
      <input type="date" id="date">
    </div>
    <div>
      <label>📍 Lieu</label>
      <input type="text" id="lieu" placeholder="Paris...">
    </div>
    <div>
      <label>🌡 Température</label>
      <input type="number" id="temp" placeholder="°C">
    </div>
    <div>
      <label>🌦 Météo</label>
      <select id="meteo">
        <option value="">Choisir...</option>
        <option>☀️ Ensoleillé</option>
        <option>⛅ Nuageux</option>
        <option>🌧 Pluvieux</option>
        <option>⛈ Orageux</option>
        <option>❄️ Neigeux</option>
        <option>🌫 Brumeux</option>
        <option>🌬 Venteux</option>
      </select>
    </div>
  </div>

  <div style="margin-bottom:12px">
    <p class="section-label">😊 Humeur</p>
    <div class="emoji-grid" id="moodGrid">
      <button class="emoji-btn" onclick="selectMood(this,'😄')">😄</button>
      <button class="emoji-btn" onclick="selectMood(this,'🙂')">🙂</button>
      <button class="emoji-btn" onclick="selectMood(this,'😐')">😐</button>
      <button class="emoji-btn" onclick="selectMood(this,'😔')">😔</button>
      <button class="emoji-btn" onclick="selectMood(this,'😠')">😠</button>
      <button class="emoji-btn" onclick="selectMood(this,'🥶')">🥶</button>
      <button class="emoji-btn" onclick="selectMood(this,'🥵')">🥵</button>
      <button class="emoji-btn" onclick="selectMood(this,'😴')">😴</button>
    </div>
  </div>

  <div style="margin-bottom:12px">
    <label>📝 Note du jour</label>
    <textarea id="note" placeholder="Comment s'est passée ta journée ?"></textarea>
  </div>

  <button class="btn-submit" onclick="addEntry()">＋ Ajouter cette entrée</button>
</div>

<div class="card">
  <div class="entries-header">
    <span class="entries-title">📖 Mes entrées</span>
    <span class="count-badge" id="countBadge">0 entrée</span>
  </div>
  <div id="entriesList"><p class="empty">Aucune entrée pour l'instant 🌱</p></div>
</div>

<script>
  let mood = '';
  let entries = JSON.parse(localStorage.getItem('meteoEntries') || '[]');

  // Date du jour par défaut
  document.getElementById('date').value = new Date().toISOString().split('T')[0];

  function selectMood(btn, m) {
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    mood = m;
  }

  function addEntry() {
    const date = document.getElementById('date').value;
    const lieu = document.getElementById('lieu').value;
    const temp = document.getElementById('temp').value;
    const meteo = document.getElementById('meteo').value;
    const note = document.getElementById('note').value;

    if (!date || !meteo) {
      alert('Remplis au moins la date et la météo !');
      return;
    }

    entries.unshift({ date, lieu, temp, meteo, note, mood, id: Date.now() });
    localStorage.setItem('meteoEntries', JSON.stringify(entries));
    renderEntries();
    resetForm();
  }

  function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    localStorage.setItem('meteoEntries', JSON.stringify(entries));
    renderEntries();
  }

  function resetForm() {
    document.getElementById('lieu').value = '';
    document.getElementById('temp').value = '';
    document.getElementById('meteo').value = '';
    document.getElementById('note').value = '';
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
    mood = '';
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
  }

  function formatDate(d) {
    return new Date(d + 'T12:00:00').toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  }

  function renderEntries() {
    const list = document.getElementById('entriesList');
    const badge = document.getElementById('countBadge');
    badge.textContent = entries.length + (entries.length > 1 ? ' entrées' : ' entrée');

    if (entries.length === 0) {
      list.innerHTML = '<p class="empty">Aucune entrée pour l\'instant 🌱</p>';
      return;
    }

    list.innerHTML = entries.map(e => `
      <div class="entry-card">
        <div class="entry-top">
          <span class="entry-date">${formatDate(e.date)}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="entry-mood">${e.mood || ''}</span>
            <button class="delete-btn" onclick="deleteEntry(${e.id})">✕</button>
          </div>
        </div>
        <div class="entry-temps">${e.temp ? e.temp + '°C' : ''} ${e.meteo}</div>
        ${e.lieu ? `<div class="entry-lieu">📍 ${e.lieu}</div>` : ''}
        ${e.note ? `<div class="entry-note">${e.note}</div>` : ''}
      </div>
    `).join('');
  }

  renderEntries();
</script>
</body>
</html>
