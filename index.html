<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Météo Journal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --blur: blur(40px);
  --radius: 22px;
  --glass: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.14);
}

body {
  font-family: -apple-system, 'SF Pro Display', sans-serif;
  min-height: 100vh;
  background: #0a0a1a;
  color: white;
  overflow-x: hidden;
}

.bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(100,120,255,0.35) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 10%, rgba(180,100,255,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(0,180,255,0.2) 0%, transparent 55%),
    #0a0a1a;
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 430px;
  margin: 0 auto;
  padding: 60px 18px 40px;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 36px;
}

.header-icon {
  font-size: 3.5rem;
  display: block;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 20px rgba(100,150,255,0.6));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.header h1 {
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(135deg, #fff 30%, rgba(150,180,255,0.9));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header p {
  margin-top: 6px;
  color: rgba(255,255,255,0.4);
  font-size: 0.9rem;
  font-weight: 400;
  letter-spacing: 0.2px;
}

/* CARD */
.card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 22px 18px;
  margin-bottom: 14px;
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.card-title {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 16px;
}

/* INPUTS */
.row { display: grid; gap: 10px; margin-bottom: 10px; }
.row-2 { grid-template-columns: 1fr 1fr; }
.row-3 { grid-template-columns: 1fr 1fr 1fr; }

.field label {
  display: block;
  font-size: 0.72rem;
  font-weight: 600;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.4px;
  margin-bottom: 7px;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 13px 14px;
  color: white;
  font-size: 1rem;
  font-family: -apple-system, sans-serif;
  outline: none;
  transition: all 0.2s;
  -webkit-appearance: none;
}

.field input:focus,
.field select:focus,
.field textarea:focus {
  background: rgba(255,255,255,0.12);
  border-color: rgba(120,160,255,0.6);
  box-shadow: 0 0 0 3px rgba(100,140,255,0.15);
}

.field input::placeholder,
.field textarea::placeholder {
  color: rgba(255,255,255,0.25);
}

.field select option { background: #1a1a3e; color: white; }

.field textarea {
  resize: none;
  height: 90px;
  line-height: 1.5;
}

/* MOOD */
.mood-row {
  display: flex;
  gap: 8px;
  justify-content: space-between;
}

.mood-btn {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 12px 4px;
  font-size: 1.5rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.mood-btn span.lbl {
  font-size: 0.55rem;
  color: rgba(255,255,255,0.4);
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.mood-btn.active {
  background: rgba(120,160,255,0.2);
  border-color: rgba(120,160,255,0.6);
  transform: scale(1.08);
  box-shadow: 0 4px 16px rgba(100,140,255,0.25);
}

/* BOUTON */
.btn-add {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #5b7fff, #a855f7);
  border: none;
  border-radius: 16px;
  color: white;
  font-size: 1rem;
  font-weight: 700;
  font-family: -apple-system, sans-serif;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 6px 24px rgba(91,127,255,0.4);
  margin-top: 4px;
}

.btn-add:active { transform: scale(0.97); opacity: 0.9; }

/* STATS */
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.stat {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  padding: 16px 10px;
  text-align: center;
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
}

.stat-num {
  font-size: 1.6rem;
  font-weight: 800;
  background: linear-gradient(135deg, #fff, #a0b4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.stat-lbl {
  font-size: 0.65rem;
  color: rgba(255,255,255,0.4);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 3px;
}

/* LISTE */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.section-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
}

.count-pill {
  background: rgba(91,127,255,0.25);
  border: 1px solid rgba(91,127,255,0.4);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.75rem;
  font-weight: 600;
  color: rgba(180,200,255,0.9);
}

.empty {
  text-align: center;
  padding: 40px 20px;
  color: rgba(255,255,255,0.3);
  font-size: 0.95rem;
}

.entry {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  animation: slideIn 0.35s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.entry-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}

.entry-date {
  font-size: 0.78rem;
  font-weight: 600;
  color: rgba(180,200,255,0.7);
  text-transform: capitalize;
}

.entry-actions { display: flex; align-items: center; gap: 10px; }

.entry-mood-big { font-size: 1.4rem; line-height: 1; }

.del-btn {
  background: rgba(255,80,80,0.15);
  border: 1px solid rgba(255,80,80,0.25);
  border-radius: 10px;
  width: 28px; height: 28px;
  color: rgba(255,120,120,0.8);
  font-size: 0.75rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}

.del-btn:active { transform: scale(0.9); }

.entry-main {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.entry-meteo {
  font-size: 1.8rem;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
}

.entry-info { flex: 1; }

.entry-temp {
  font-size: 1.5rem;
  font-weight: 800;
  color: white;
  line-height: 1;
}

.entry-meteo-label {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.5);
  margin-top: 2px;
}

.entry-lieu {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.4);
  margin-bottom: 6px;
}

.entry-note {
  font-size: 0.88rem;
  color: rgba(255,255,255,0.65);
  line-height: 1.5;
  border-top: 1px solid rgba(255,255,255,0.07);
  padding-top: 8px;
  margin-top: 4px;
}

/* NOTIF */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(91,127,255,0.9);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 12px 22px;
  font-size: 0.88rem;
  font-weight: 600;
  color: white;
  z-index: 999;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="bg"></div>
<div class="toast" id="toast">✅ Entrée ajoutée !</div>

<div class="wrap">

  <!-- HEADER -->
